name: Deploy

on:
  push:
    branches: ["master", "querydsl-*", "8.x"]
    tags: ["*"]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  MAVEN_OPTS: -Xmx3200m

jobs:
  # Deploy SNAPSHOT artifacts to Maven Central on every push to master / querydsl-* / 8.x branches.
  snapshot:
    if: startsWith(github.ref, 'refs/heads/')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: central
    steps:
      - uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-build

      - name: Import GPG key
        # Accept the secret either base64-encoded or as a raw ASCII-armored key.
        run: |
          if [[ "$GPG_KEY" == *"BEGIN PGP"* ]]; then
            printf '%s\n' "$GPG_KEY" | gpg --batch --yes --import
          else
            printf '%s\n' "$GPG_KEY" | base64 -d | gpg --batch --yes --import
          fi
        env:
          GPG_KEY: ${{ secrets.GPG_KEY }}

      - name: Deploy snapshot to Maven Central
        env:
          CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: >
          ./mvnw -ntp -B -nsu -s .github/settings.xml -DskipTests=true
          deploy -Prelease -pl '!:querydsl-apt-test'

  # Deploy a release to Maven Central (staging) when a tag is pushed.
  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: central
    steps:
      - uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-build

      - name: Import GPG key
        # Accept the secret either base64-encoded or as a raw ASCII-armored key.
        run: |
          if [[ "$GPG_KEY" == *"BEGIN PGP"* ]]; then
            printf '%s\n' "$GPG_KEY" | gpg --batch --yes --import
          else
            printf '%s\n' "$GPG_KEY" | base64 -d | gpg --batch --yes --import
          fi
        env:
          GPG_KEY: ${{ secrets.GPG_KEY }}

      - name: Deploy release to Maven Central
        env:
          CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: >
          ./mvnw -ntp -B -nsu -s .github/settings.xml -DskipTests=true
          deploy -Prelease,staging -pl '!:querydsl-apt-test'
