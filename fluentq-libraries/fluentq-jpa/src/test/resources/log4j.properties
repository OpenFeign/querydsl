### direct log messages to stdout ###
log4j.appender.stdout=org.apache.log4j.ConsoleAppender
#log4j.appender.stdout.Target=System.out
log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
log4j.appender.stdout.layout.ConversionPattern=%5p [%d{yyyy-MM-dd HH:mm:ss}] (%F:%L) - %m %X%n

### set log levels - for more verbose logging change 'info' to 'debug' ###

log4j.rootLogger=debug, stdout

log4j.appender.fluentq=org.apache.log4j.ConsoleAppender
log4j.appender.fluentq.layout=org.apache.log4j.PatternLayout
log4j.appender.fluentq.layout.ConversionPattern=FluentQ : %C#%M - %m%n

#log4j.logger.fluentq.jpa.hibernate=DEBUG, fluentq
#log4j.logger.fluentq.jpa.impl=DEBUG, fluentq

log4j.logger.org.hibernate=debug
log4j.logger.org.hibernate.tool.hbm2ddl=debug